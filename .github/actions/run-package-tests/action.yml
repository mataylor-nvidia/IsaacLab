name: 'Run Package Tests'
description: >
  Pulls the Docker image from ECR, runs pytest inside the container, uploads
  results as an artifact, and fails fork PRs on test failures.
  NOTE: The calling job must check out the code before using this action.

inputs:
  image-tag:
    description: 'Docker image tag'
    required: true
  isaacsim-base-image:
    description: 'IsaacSim base image'
    required: true
  isaacsim-version:
    description: 'IsaacSim version'
    required: true
  dockerfile-path:
    description: 'Path to Dockerfile'
    default: 'docker/Dockerfile.base'
    required: false
  cache-tag:
    description: 'ECR cache tag'
    default: 'cache-base'
    required: false
  filter-pattern:
    description: >-
      Pattern to filter test files (e.g., isaaclab_tasks); test files whose path
      contains this pattern are included. Only one pattern can be used at a time,
      no comma-separated substrings allowed. Also supports the legacy "not <pattern>"
      form for exclude-only jobs.
    default: ''
    required: false
  exclude-pattern:
    description: >-
      Comma-separated substrings; test files whose path contains any entry are
      skipped. Combines with filter-pattern (include + exclude).
    default: ''
    required: false
  shard-index:
    description: 'Zero-based shard index'
    default: ''
    required: false
  shard-count:
    description: 'Total number of shards'
    default: ''
    required: false
  curobo-only:
    description: 'Run only cuRobo and SkillGen tests'
    default: 'false'
    required: false
  quarantined-only:
    description: 'Run only quarantined tests'
    default: 'false'
    required: false
  include-files:
    description: 'Comma-separated list of specific test files to include'
    default: ''
    required: false
  pytest-options:
    description: 'Additional pytest options'
    default: ''
    required: false
  extra-pip-packages:
    description: 'Space-separated pip packages to install inside the Docker container before pytest starts'
    default: ''
    required: false
  omni-github-test-type:
    description: 'Test type stored on each uploaded omni-github test row'
    default: 'pytest'
    required: false
  testmon-mode:
    description: 'Override Testmon mode with select or collect'
    default: ''
    required: false
  container-name:
    description: 'Docker container name prefix (run-id is appended automatically)'
    required: true
runs:
  using: composite
  steps:
    # Display some details on AWS instance we're running on
    - name: AWS Instance Info
      shell: bash
      run: |
        # get instance ID for debugging purposes (if running on EC2)
        IMDS_TOKEN=$(curl -sf -X PUT "http://169.254.169.254/latest/api/token" \
          -H "X-aws-ec2-metadata-token-ttl-seconds: 21600") || true
        if [ -n "$IMDS_TOKEN" ]; then
          INSTANCE_ID=$(curl -sf -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
            "http://169.254.169.254/latest/meta-data/instance-id") || true
          INSTANCE_REGION=$(curl -sf -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
              "http://169.254.169.254/latest/meta-data/placement/region") || true
          INSTANCE_TYPE=$(curl -sf -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
              "http://169.254.169.254/latest/meta-data/instance-type") || true
          echo "⚪ Instance ID: ${INSTANCE_ID:-Not running on EC2}"
          echo "⚪ Instance Region: ${INSTANCE_REGION:-Not running on EC2}"
          echo "⚪ Instance Type: ${INSTANCE_TYPE:-Not running on EC2}"
          echo "⚪ Connect: https://${INSTANCE_REGION}.console.aws.amazon.com/ec2-instance-connect/ssh/home?region=${INSTANCE_REGION}&connType=standard&instanceId=${INSTANCE_ID}&osUser=ubuntu&sshPort=22&addressFamily=ipv4"
        else
          echo "🟠 Could not obtain IMDS token, probably not running on EC2"
        fi

    - name: Prepare Docker disk space
      shell: bash
      run: |
        bash .github/actions/run-package-tests/cleanup_docker_storage.sh \
          "${{ inputs.isaacsim-base-image }}:${{ inputs.isaacsim-version }}" \
          "isaacsim-pin-${{ inputs.container-name }}-${{ github.run_id }}-${{ github.run_attempt }}-pre" \
          "pre-test-cleanup" \
          "true"

    - name: Record pull start time
      id: pull-start
      shell: bash
      run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

    - name: Pull image from ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ inputs.image-tag }}
        isaacsim-base-image: ${{ inputs.isaacsim-base-image }}
        isaacsim-version: ${{ inputs.isaacsim-version }}
        dockerfile-path: ${{ inputs.dockerfile-path }}
        cache-tag: ${{ inputs.cache-tag }}

    - name: Report pull duration
      if: always()
      shell: bash
      run: |
        start_time="${{ steps.pull-start.outputs.time }}"
        if [ -z "$start_time" ]; then
          echo "🟠 Could not calculate pull duration (start time not recorded)" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        elapsed=$(( $(date +%s) - start_time ))
        printf "🔵 Image pull took %dm %ds\n" $((elapsed/60)) $((elapsed%60))
        echo "🔵 Docker Image Pulled in ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"

    - name: Select Testmon Mode
      id: testmon-mode
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        REQUESTED_MODE: ${{ inputs.testmon-mode }}
      run: |
        mode="${REQUESTED_MODE:-collect}"
        if [ -z "$REQUESTED_MODE" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
          if changed_files="$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')"; then
            grep -qvE '\.py$' <<< "$changed_files" || mode=select
          else
            echo "::warning::Could not list changed files; running the full test suite"
          fi
        fi
        echo "mode=$mode" >> "$GITHUB_OUTPUT"
        echo "Testmon mode: $mode" >> "$GITHUB_STEP_SUMMARY"

    - name: Restore Testmon Data
      uses: actions/cache@v4
      with:
        path: .testmon/${{ inputs.container-name }}
        key: testmon-${{ runner.arch }}-${{ inputs.container-name }}-${{ hashFiles('tools/conftest.py', 'tools/test_settings.py', '.github/actions/run-tests/action.yml', 'docker/Dockerfile.base', 'docker/Dockerfile.curobo', '.github/workflows/config.yaml') }}-${{ github.sha }}
        restore-keys: testmon-${{ runner.arch }}-${{ inputs.container-name }}-${{ hashFiles('tools/conftest.py', 'tools/test_settings.py', '.github/actions/run-tests/action.yml', 'docker/Dockerfile.base', 'docker/Dockerfile.curobo', '.github/workflows/config.yaml') }}-

    - name: Run Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "${{ github.job }}-report.xml"
        container-name: "${{ inputs.container-name }}-${{ github.run_id }}-${{ github.run_attempt }}"
        image-tag: ${{ inputs.image-tag }}
        pytest-options: ${{ inputs.pytest-options }}
        filter-pattern: ${{ inputs.filter-pattern }}
        exclude-pattern: ${{ inputs.exclude-pattern }}
        shard-index: ${{ inputs.shard-index }}
        shard-count: ${{ inputs.shard-count }}
        curobo-only: ${{ inputs.curobo-only }}
        quarantined-only: ${{ inputs.quarantined-only }}
        include-files: ${{ inputs.include-files }}
        volume-mount-source: ${{ github.workspace }}
        extra-pip-packages: ${{ inputs.extra-pip-packages }}
        omni-github-test-type: ${{ inputs.omni-github-test-type }}
        testmon-data-dir: .testmon/${{ inputs.container-name }}
        testmon-mode: ${{ steps.testmon-mode.outputs.mode }}

    - name: Check Test Results
      if: always()
      shell: bash
      run: |
        if [ -f "reports/${{ github.job }}-report.xml" ]; then
          if grep -qE 'failures="[1-9][0-9]*"' reports/${{ github.job }}-report.xml || grep -qE 'errors="[1-9][0-9]*"' reports/${{ github.job }}-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

    - name: Kill container on cancellation
      if: cancelled()
      shell: bash
      run: |
        CONTAINER="${{ inputs.container-name }}-${{ github.run_id }}-${{ github.run_attempt }}"
        echo "🟠 Workflow cancelled, force-killing container ${CONTAINER}..."
        docker kill "${CONTAINER}" 2>/dev/null || true
        docker rm -f "${CONTAINER}" 2>/dev/null || true

    - name: Cleanup old Docker images
      if: always()
      shell: bash
      run: |
        bash .github/actions/run-package-tests/cleanup_docker_storage.sh \
          "${{ inputs.isaacsim-base-image }}:${{ inputs.isaacsim-version }}" \
          "isaacsim-pin-${{ inputs.container-name }}-${{ github.run_id }}-${{ github.run_attempt }}-post" \
          "post-job-cleanup" \
          "false"
