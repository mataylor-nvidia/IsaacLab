# Windows CI — exercises Isaac Lab on Windows GPU self-hosted runners.
# Single consolidated job to dodge runner-pool autoscaler idle-down (which
# would tear the runner between multiple smaller jobs and starve any queued
# siblings; observed repeatedly in the per-tier split).
# Same coverage as the previous per-tier layout:
#   deps smoke (general) -> path-IO tests -> Kit headless boot ->
#   cartpole training smoke (state rsl_rl + perception rl_games) ->
#   perception smoke (cartpole RGB-Camera, needs Vulkan/WDDM) ->
#   wheel build + reinstall.
# Setup chain (uv venv, editable installs, isaacsim, Sim path resolution) is
# done once and shared. Each test step is `continue-on-error: true` so a
# single failure (e.g. perception under TCC) does not skip the rest. A final
# Aggregate step parses the per-step JUnit XMLs and fails the job if any
# non-perception test step had failures/errors.
#
# PowerShell uses `$ErrorActionPreference = "Stop"` so any nonzero exit
# fails the step. Kit-launching steps wrap python with
# Start-Process / WaitForExit / Stop-Process for OS-level (GIL-immune)
# watchdog. Pytest uses --timeout-method=thread because SIGALRM is
# unavailable on Windows.

name: Windows CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
      - 'release/**'
  push:
    branches:
      - main
      - develop
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

# Accept the Omniverse/Isaac Sim EULA non-interactively so Kit bootstrap on the
# Windows runner doesn't block waiting for stdin (manifests as
# "Unable to bootstrap inner kit kernel: EOF when reading a line").
# Headless / no-window / no-watchdog flags mirror PR #4018's known-working
# Windows env block so Kit's RTX path can boot without a display server and
# without the global watchdog killing it.
env:
  # EULA acceptance (three names because different layers check different ones).
  OMNI_KIT_ACCEPT_EULA: "yes"
  ACCEPT_EULA: "Y"
  ISAACSIM_ACCEPT_EULA: "YES"
  PRIVACY_CONSENT: "Y"
  # Headless mode signals.
  HEADLESS: "1"
  ISAAC_SIM_HEADLESS: "1"
  ISAAC_SIM_LOW_MEMORY: "1"
  WINDOWS_PLATFORM: "true"
  # Kit must not try to open a window or attach a watchdog when no desktop
  # session is bound (Windows runner under github-runner service).
  OMNI_KIT_NO_WINDOW: "1"
  OMNI_KIT_DISABLE_WATCHDOG: "1"
  OMNI_KIT_TELEMETRY: "0"
  CARB_LOGGING_SEVERITY: "error"
  # Python output buffering / encoding for log readability.
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_windows_ci: ${{ steps.detect.outputs.run_windows_ci }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          patterns=(
            $'^source/\tLibrary source code'
            $'^tools/\tBuild tooling'
            $'^apps/\tStandalone apps'
            $'(^|/)pyproject\\.toml$\tPython project metadata'
            $'^\\.github/workflows/windows-ci\\.yaml$\tThis workflow file'
            $'^VERSION$\tVersion file'
          )
          any_match() {
            local files="$1" entry regex
            for entry in "${patterns[@]}"; do
              IFS=$'\t' read -r regex _ <<< "$entry"
              if grep -qE "$regex" <<< "$files"; then
                return 0
              fi
            done
            return 1
          }
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename' || true)"
          if [ -z "$changed_files" ] || any_match "$changed_files"; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_windows_ci=false" >> "$GITHUB_OUTPUT"
          fi

  # Single Windows CI job — everything runs on the same runner allocation in
  # sequence so the autoscaler never sees an idle gap mid-run.
  windows-ci:
    name: windows-ci
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    # Generous outer cap covers full sequence: setup (~5min) + 5 test steps
    # (~3-7min each) + wheel build (~10min) + cleanup. Real expected wall
    # ~35-45 min; 90 bounds runaway.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Report instance state (BEFORE)
        uses: ./.github/actions/windows-instance-state
        with: { phase: pre }

      - name: Install uv
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          # uv installs into $HOME\.local\bin on Windows; add to PATH for next steps.
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      # Single setup step — venv create + every editable install + isaacsim +
      # CUDA torch + h5py + pytest. Shared across all subsequent test steps.
      # Hard fail aborts the job (no continue-on-error) since downstream steps
      # all depend on this venv.
      - name: Setup venv + install isaaclab + isaacsim + test deps
        id: setup
        shell: powershell
        timeout-minutes: 25
        run: |
          $ErrorActionPreference = "Stop"
          # --seed installs pip / setuptools / wheel into the venv so the
          # wheel-builder step can later run `python -m pip install build wheel`
          # inside this venv (uv venv ships without pip by default).
          uv venv --python 3.12 --seed env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          uv pip install -e source/isaaclab
          # isaaclab_physx is a runtime dep of isaaclab_tasks (the
          # GroundPlaneCfg.physics_material forwarding shim imports it eagerly
          # when isaaclab_tasks is walked at import time). --no-deps because
          # isaaclab-physx==1.1.0 declares a hard dep on isaaclab-ppisp,
          # which is not on any index nor in source/. The ppisp import is
          # lazy at runtime.
          uv pip install --no-deps -e source/isaaclab_physx
          uv pip install -e source/isaaclab_assets
          uv pip install -e source/isaaclab_tasks
          # source/isaaclab_rl[rsl_rl,rl_games] pulls rsl-rl-lib + rl-games
          # (declared as extras in isaaclab_rl/setup.py). The training smoke
          # invokes both rsl_rl/train.py and rl_games/train.py.
          uv pip install -e 'source/isaaclab_rl[rsl_rl,rl_games]'
          # Test deps: h5py for hdf5 tests, cu128 torch wheel because pypi's
          # default torch is CPU-only and test_episode_data has [cuda:0]
          # parametrize cases.
          uv pip install pytest pytest-timeout h5py
          uv pip install --upgrade --index-url https://download.pytorch.org/whl/cu128 torch torchvision
          # Isaac Sim — extscache extra is required (without it the Sim
          # extension cache is missing on disk and Kit bootstrap fails with
          # "Unable to expose isaacsim.simulation_app API").
          uv pip install --extra-index-url https://pypi.nvidia.com 'isaacsim[all,extscache]==6.0.0.*'
          # Smoke import to fail fast if anything above was broken.
          python -c "import isaaclab, isaaclab_assets, isaaclab_tasks; print('editable imports ok')"
          New-Item -ItemType Directory -Force -Path "reports" | Out-Null

      - name: Resolve Isaac Sim paths (ISAAC_PATH / CARB_APP_PATH / EXP_PATH / DLL search)
        id: sim-paths
        uses: ./.github/actions/windows-sim-paths
        with: { venv-path: 'env_isaaclab_uv' }

      # ===== Test branches (each independent, continue-on-error). =====

      - name: Deps smoke (torch + scipy)
        id: test-deps
        if: always() && steps.setup.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          python -m pytest `
            source/isaaclab/test/deps `
            --ignore=tools/conftest.py `
            -m windows_ci `
            --continue-on-collection-errors `
            --timeout=60 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/deps-smoke.xml

      - name: Path-IO tests (utils)
        id: test-pathio
        if: always() && steps.setup.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # Explicit windows_ci-tagged files only — avoids importing neighbors
          # whose module-level code (AppLauncher, parser.parse_args, etc.) raises
          # on Windows without Sim properly initialised (KeyError EXP_PATH in
          # test_version, test_wrench_composer_*; argparse hijack in
          # test_tiled_camera_env).
          python -m pytest `
            source/isaaclab/test/utils/test_configclass.py `
            source/isaaclab/test/utils/test_dict.py `
            source/isaaclab/test/utils/test_episode_data.py `
            source/isaaclab/test/utils/test_hdf5_dataset_file_handler.py `
            --continue-on-collection-errors `
            --timeout=120 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/path-io.xml

      - name: Kit headless boot smoke
        id: test-kit-launch
        if: always() && steps.sim-paths.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 8
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          $script = @'
          import sys
          from isaaclab.app import AppLauncher

          app_launcher = AppLauncher(headless=True)
          sim = app_launcher.app
          assert sim is not None, "AppLauncher did not return a SimulationApp"
          sim.close()
          sys.exit(0)
          '@
          $script | Out-File -FilePath kit_launch_smoke.py -Encoding utf8
          # Process-level watchdog: 5 min hard cap. Python thread watchdogs
          # are GIL-vulnerable (a C-level hang in Kit init can never release
          # the GIL). Start-Process + WaitForExit is OS-level and immune.
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "kit_launch_smoke.py"
          if (-not $proc.WaitForExit(300000)) {
            Write-Host "::error::kit-launch hard timeout (5 min) - Kit hung; killing python tree"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            $proc.WaitForExit()
            exit 124
          }
          exit $proc.ExitCode

      - name: Cartpole training smoke (state rsl_rl + perception rl_games)
        id: test-training-smoke
        if: always() && steps.sim-paths.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # Subprocess inside the test invokes ./isaaclab.bat -p
          # scripts/.../<framework>/train.py for 2 PPO iters each.
          python -m pytest `
            source/isaaclab_tasks/test/test_cartpole_training_smoke.py `
            --continue-on-collection-errors `
            --timeout=600 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/training-smoke.xml

      - name: Cartpole-camera perception smoke (RTX / Vulkan path)
        id: test-perception
        if: always() && steps.sim-paths.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 8
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          $script = @'
          import sys
          from isaaclab.app import AppLauncher

          # No in-script watchdog: a Python thread cannot preempt a Kit init
          # that hangs in a C call holding the GIL. The hard timeout lives at
          # the PowerShell layer below (Start-Process + WaitForExit).
          app_launcher = AppLauncher(headless=True, enable_cameras=True)
          sim = app_launcher.app
          assert sim is not None, "AppLauncher did not return a SimulationApp"

          import gymnasium as gym
          import isaaclab_tasks  # noqa: F401  (gym env registration)

          env = gym.make("Isaac-Cartpole-RGB-Camera-Direct-v0", num_envs=1)
          obs, info = env.reset()
          assert obs is not None, "env.reset returned None observation"
          for step_i in range(3):
              action = env.action_space.sample()
              obs, reward, terminated, truncated, info = env.step(action)
              assert obs is not None, f"env.step {step_i} returned None observation"
          env.close()
          sim.close()
          sys.exit(0)
          '@
          $script | Out-File -FilePath perception_smoke.py -Encoding utf8
          # 3-min hard cap — RTX path needs Vulkan and will fail/hang fast
          # under TCC mode (vkEnumeratePhysicalDevices returns 0 devices).
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "perception_smoke.py"
          if (-not $proc.WaitForExit(180000)) {
            Write-Host "::error::perception hard timeout (3 min) - Kit/Vulkan hung; killing python tree"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            $proc.WaitForExit()
            exit 124
          }
          exit $proc.ExitCode

      # Last test step — destructively uninstalls editable isaaclab and
      # reinstalls from the built wheel. Placed last so the test branches
      # above run against the editable install (matches user workflow).
      - name: Wheel build + reinstall + smoke import
        id: test-wheel-build
        if: always() && steps.setup.outcome == 'success'
        continue-on-error: true
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # Git for Windows ships bash.exe but doesn't put it on PowerShell's
          # PATH; call it directly so the build script can run.
          $gitBash = "C:\Program Files\Git\bin\bash.exe"
          if (-not (Test-Path $gitBash)) { throw "Git Bash not found at $gitBash" }
          # Override the build script's default `python3` since git-bash on
          # Windows only has `python` (no `python3` symlink).
          $env:PYTHON = "python"
          & $gitBash tools/wheel_builder/build.sh
          if ($LASTEXITCODE -ne 0) { throw "wheel_builder/build.sh failed with exit $LASTEXITCODE" }
          $wheel = Get-ChildItem -Path "tools/wheel_builder/build/dist" -Filter "isaaclab-*.whl" | Select-Object -First 1
          if (-not $wheel) { throw "no wheel found in tools/wheel_builder/build/dist" }
          uv pip uninstall isaaclab
          uv pip install "$($wheel.FullName)[all]"
          python -c "import isaaclab; print('wheel install ok:', isaaclab.__file__)"

      # ===== Reporting + cleanup. =====

      - name: Upload all test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-reports
          path: |
            reports/
            kit_launch_smoke.py
            perception_smoke.py
          retention-days: 7
          if-no-files-found: ignore

      # Aggregate per-step outcomes. perception is expected to fail under TCC
      # mode on the current runner (see PR #5700 description); flag it as a
      # warning but do NOT fail the overall job for it until WDDM lands on
      # the runner pool. Everything else IS allowed to fail the job.
      - name: Aggregate test results
        if: always()
        shell: powershell
        run: |
          $results = [ordered]@{
            "setup"           = "${{ steps.setup.outcome }}"
            "sim-paths"       = "${{ steps.sim-paths.outcome }}"
            "deps"            = "${{ steps.test-deps.outcome }}"
            "path-io"         = "${{ steps.test-pathio.outcome }}"
            "kit-launch"      = "${{ steps.test-kit-launch.outcome }}"
            "training-smoke"  = "${{ steps.test-training-smoke.outcome }}"
            "perception"      = "${{ steps.test-perception.outcome }}"
            "wheel-build"     = "${{ steps.test-wheel-build.outcome }}"
          }
          Write-Host "=== windows-ci step outcomes ==="
          foreach ($k in $results.Keys) {
            "{0,-16} {1}" -f $k, $results[$k]
          }
          # Steps that gate the job. perception is intentionally excluded
          # until the runner-pool fix (TCC->WDDM) lands.
          $blocking = @("setup", "sim-paths", "deps", "path-io", "kit-launch", "training-smoke", "wheel-build")
          $failed = @()
          foreach ($k in $blocking) {
            if ($results[$k] -eq "failure") { $failed += $k }
          }
          if ($failed.Count -gt 0) {
            Write-Host "::error::Failing job — these steps failed: $($failed -join ', ')"
            exit 1
          }
          if ($results["perception"] -eq "failure") {
            Write-Host "::warning::perception step failed (expected while runner is in TCC mode; not gating the job)"
          }
          Write-Host "All gating steps passed."

      - name: Report instance state + cleanup (AFTER)
        if: always()
        uses: ./.github/actions/windows-instance-state
        with: { phase: post }
