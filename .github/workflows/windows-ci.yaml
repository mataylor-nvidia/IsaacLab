# Windows CI — exercises Isaac Lab on Windows GPU self-hosted runners.
# Same shape as arm-ci.yaml but the install path is native pip + uv on the
# host (no Docker on Windows for Linux-based Isaac Sim wheels).
#   Tier 1 (smoke + install): general-windows, install-windows, kit-launch-windows
#   Tier 2 (meaningful, marker-filtered): path-io-windows, perception-windows
#
# Every job sets `continue-on-error: true` while the Windows runner setup
# stabilizes. Every pytest invocation passes `--timeout=N` (pytest-timeout)
# plus `--timeout-method=thread` (signals unavailable on Windows) so a single
# hung test cannot consume the whole job slot. Inline PowerShell uses
# `$ErrorActionPreference = "Stop"` so any nonzero exit fails the step.

name: Windows CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
      - 'release/**'
  push:
    branches:
      - main
      - develop
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

# Accept the Omniverse/Isaac Sim EULA non-interactively so Kit bootstrap on the
# Windows runner doesn't block waiting for stdin (manifests as
# "Unable to bootstrap inner kit kernel: EOF when reading a line").
env:
  OMNI_KIT_ACCEPT_EULA: "yes"
  ACCEPT_EULA: "Y"
  PRIVACY_CONSENT: "Y"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_windows_ci: ${{ steps.detect.outputs.run_windows_ci }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          patterns=(
            $'^source/\tLibrary source code'
            $'^tools/\tBuild tooling'
            $'^apps/\tStandalone apps'
            $'(^|/)pyproject\\.toml$\tPython project metadata'
            $'^\\.github/workflows/windows-ci\\.yaml$\tThis workflow file'
            $'^VERSION$\tVersion file'
          )
          any_match() {
            local files="$1" entry regex
            for entry in "${patterns[@]}"; do
              IFS=$'\t' read -r regex _ <<< "$entry"
              if grep -qE "$regex" <<< "$files"; then
                return 0
              fi
            done
            return 1
          }
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename' || true)"
          if [ -z "$changed_files" ] || any_match "$changed_files"; then
            echo "run_windows_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_windows_ci=false" >> "$GITHUB_OUTPUT"
          fi

  # Tier 1: dependency smoke. No isaaclab install, just torch + scipy.
  general-windows:
    name: general-windows
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    # Job is venv create + small pip install + pytest with --timeout=60s.
    # Anything beyond 15 min means a hang we want to surface fast.
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Setup env
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "env_isaaclab")) {
            python -m venv env_isaaclab
          }
          & "env_isaaclab\Scripts\Activate.ps1"
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout scipy numpy
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu128

      - name: Run smoke tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab\Scripts\Activate.ps1"
          New-Item -ItemType Directory -Force -Path "reports" | Out-Null
          $env:PYTHONUNBUFFERED = "1"
          $env:PYTHONIOENCODING = "utf-8"
          # --timeout-method=thread: SIGALRM is unavailable on Windows; the thread
          # method uses a Python thread to raise on timeout (slightly less reliable
          # than signal on Linux but is the only option here).
          # --continue-on-collection-errors: broken imports in unrelated files do
          # not poison the job; pytest still runs the windows_ci-tagged tests.
          # Marker-driven discovery: any test under source/isaaclab/test/deps tagged
          # with windows_ci is auto-picked.
          python -m pytest `
            source/isaaclab/test/deps `
            --ignore=tools/conftest.py `
            -m windows_ci `
            --continue-on-collection-errors `
            --timeout=60 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/general-windows.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: general-windows-report
          path: reports/general-windows.xml
          retention-days: 7

  # Tier 1: install probe + wheel build + reinstall. Catches setup.py Linux-isms.
  install-windows:
    name: install-windows
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    # uv editable installs + wheel build + reinstall — 30 min is well above
    # the typical ~15 min runtime and bounds runaway pip resolutions.
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install uv
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          # uv installs into $HOME\.local\bin on Windows; add to PATH for next steps.
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      - name: uv venv + editable install + smoke import
        shell: powershell
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python 3.12 env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # No --no-build-isolation: let uv create a temporary build env per package
          # that pulls in build-system.requires (setuptools<82, wheel, toml). Slower
          # than --no-build-isolation but reliable across all isaaclab packages.
          uv pip install -e source/isaaclab
          # isaaclab_physx is a runtime dep of isaaclab_tasks (the
          # GroundPlaneCfg.physics_material forwarding shim imports it eagerly
          # when isaaclab_tasks is walked at import time). Install before
          # touching isaaclab_tasks or the import dies with
          # "RigidBodyMaterialCfg has moved to isaaclab_physx.sim.spawners.materials".
          # --no-deps: isaaclab-physx==1.1.0 declares a hard dep on isaaclab-ppisp,
          # which is not on any index nor in source/. The dep is referenced lazily
          # at runtime, so skipping the resolver here unblocks editable install.
          uv pip install --no-deps -e source/isaaclab_physx
          uv pip install -e source/isaaclab_assets
          uv pip install -e source/isaaclab_tasks
          # Smoke import. If any of these fail, the step exits nonzero.
          python -c "import isaaclab, isaaclab_assets, isaaclab_tasks; print('editable imports ok')"

      - name: Build wheel + reinstall from wheel + smoke import
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # Build the wheel via the canonical builder. Editable install above
          # symlinks source dirs; the wheel path runs setup.py's build_py and
          # package discovery, which is what end users hit on `pip install isaaclab`.
          # Git for Windows ships bash.exe but doesn't put it on PowerShell's
          # PATH; call it directly so the build script can run.
          $gitBash = "C:\Program Files\Git\bin\bash.exe"
          if (-not (Test-Path $gitBash)) { throw "Git Bash not found at $gitBash" }
          & $gitBash tools/wheel_builder/build.sh
          if ($LASTEXITCODE -ne 0) { throw "wheel_builder/build.sh failed with exit $LASTEXITCODE" }
          $wheel = Get-ChildItem -Path "tools/wheel_builder/build/dist" -Filter "isaaclab-*.whl" | Select-Object -First 1
          if (-not $wheel) { throw "no wheel found in tools/wheel_builder/build/dist" }
          uv pip uninstall isaaclab
          uv pip install "$($wheel.FullName)[all]"
          python -c "import isaaclab; print('wheel install ok:', isaaclab.__file__)"

  # Tier 1: Kit launch. Validates Isaac Sim Windows wheels load Kit cleanly.
  kit-launch-windows:
    name: kit-launch-windows
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    # uv install + Sim install + 5 min Kit boot watchdog. 15 min outer cap so
    # a hung step never holds the single Windows runner long.
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install uv
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      - name: Install isaacsim + isaaclab and boot Kit headless
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python 3.12 env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # No --no-build-isolation: let uv create a temporary build env per package
          # that pulls in build-system.requires (setuptools<82, wheel, toml). Slower
          # than --no-build-isolation but reliable across all isaaclab packages.
          uv pip install -e source/isaaclab
          # Windows Sim wheel from pypi.nvidia.com (6.0.0.0-cp312-win_amd64).
          uv pip install --extra-index-url https://pypi.nvidia.com 'isaacsim[all,extscache]==6.0.0.*'
          # Boot Kit headless and exit cleanly. Inline Python script asserts
          # that AppLauncher returned a SimulationApp and exits 0; any failure
          # (crash, hang killed by step timeout, missing module) fails the step.
          $script = @'
          import sys
          from isaaclab.app import AppLauncher

          app_launcher = AppLauncher(headless=True)
          sim = app_launcher.app
          assert sim is not None, "AppLauncher did not return a SimulationApp"
          sim.close()
          sys.exit(0)
          '@
          $script | Out-File -FilePath kit_launch_smoke.py -Encoding utf8
          # Process-level watchdog: 5 min hard cap. Python thread watchdogs are
          # GIL-vulnerable (a C-level hang in Kit init can never release the
          # GIL, so a daemon thread cannot fire). Start-Process + WaitForExit
          # is OS-level and immune.
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "kit_launch_smoke.py"
          if (-not $proc.WaitForExit(300000)) {
            Write-Host "::error::kit-launch-windows hard timeout (5 min) — Kit hung; killing python tree"
            $proc.Kill($true)
            $proc.WaitForExit()
            exit 124
          }
          exit $proc.ExitCode

  # Tier 2: path-IO tests. Most Windows-specific bugs live here. Pure Python +
  # filesystem semantics; no Kit, no GPU.
  path-io-windows:
    name: path-io-windows
    needs: [changes]
    if: needs.changes.outputs.run_windows_ci == 'true'
    runs-on: [self-hosted, gpu-windows]
    # uv editable install + 4 small pytest files with --timeout=120s each.
    # 15 min outer cap with pytest's own per-test timeout as the inner gate.
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install uv
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      - name: Install isaaclab + run path/IO tests
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python 3.12 env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # No --no-build-isolation: let uv create a temporary build env per package
          # that pulls in build-system.requires (setuptools<82, wheel, toml). Slower
          # than --no-build-isolation but reliable across all isaaclab packages.
          uv pip install -e source/isaaclab
          uv pip install pytest pytest-timeout h5py
          # CUDA torch wheel — the default torch on Windows pypi is CPU-only,
          # so test_episode_data's [cuda:0] parametrize cases fail
          # 'Torch not compiled with CUDA enabled'.
          uv pip install --upgrade --index-url https://download.pytorch.org/whl/cu128 torch torchvision
          New-Item -ItemType Directory -Force -Path "reports" | Out-Null
          $env:PYTHONUNBUFFERED = "1"
          # Explicit windows_ci-tagged files only — avoids importing neighbors
          # whose module-level code (AppLauncher, parser.parse_args, etc.) raises
          # on Windows without Sim installed (KeyError EXP_PATH in test_version,
          # test_wrench_composer_*; argparse hijack in test_tiled_camera_env).
          python -m pytest `
            source/isaaclab/test/utils/test_configclass.py `
            source/isaaclab/test/utils/test_dict.py `
            source/isaaclab/test/utils/test_episode_data.py `
            source/isaaclab/test/utils/test_hdf5_dataset_file_handler.py `
            --continue-on-collection-errors `
            --timeout=120 `
            --timeout-method=thread `
            -v `
            --junitxml=reports/path-io-windows.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: path-io-windows-report
          path: reports/path-io-windows.xml
          retention-days: 7

  # Tier 2: perception smoke (cartpole-camera). Validates Kit + camera + step
  # on Windows GPU. Fast-fail: explicit assertions inside the inline script;
  # if anything throws, the step exits nonzero. Inner timeout 180s so we do
  # not sit on a hung Vulkan init for the full job slot.
  perception-windows:
    name: perception-windows
    needs: [changes]
    # Gated off until the Windows runner exposes a functional Vulkan/GPU stack
    # (currently `vkEnumeratePhysicalDevices failed. No physical device is found.`,
    # Kit then hangs through the in-script watchdog and consumes the runner for
    # the full job timeout, starving every other job in the workflow). Flip
    # back to needs.changes.outputs.run_windows_ci == 'true' once the runner is
    # confirmed GPU-capable.
    if: false
    runs-on: [self-hosted, gpu-windows]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install uv
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\bin"

      - name: Install isaaclab + isaacsim and run cartpole-camera smoke
        shell: powershell
        timeout-minutes: 20
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python 3.12 env_isaaclab_uv
          & "env_isaaclab_uv\Scripts\Activate.ps1"
          # No --no-build-isolation: let uv create a temporary build env per package
          # that pulls in build-system.requires (setuptools<82, wheel, toml). Slower
          # than --no-build-isolation but reliable across all isaaclab packages.
          uv pip install -e source/isaaclab
          # isaaclab_physx is a runtime dep of isaaclab_tasks (the
          # GroundPlaneCfg.physics_material forwarding shim imports it eagerly
          # when isaaclab_tasks is walked at import time). Install before
          # touching isaaclab_tasks or the import dies with
          # "RigidBodyMaterialCfg has moved to isaaclab_physx.sim.spawners.materials".
          # --no-deps: isaaclab-physx==1.1.0 declares a hard dep on isaaclab-ppisp,
          # which is not on any index nor in source/. The dep is referenced lazily
          # at runtime, so skipping the resolver here unblocks editable install.
          uv pip install --no-deps -e source/isaaclab_physx
          uv pip install -e source/isaaclab_assets
          uv pip install -e source/isaaclab_tasks
          uv pip install --extra-index-url https://pypi.nvidia.com 'isaacsim[all,extscache]==6.0.0.*'
          $script = @'
          import sys
          from isaaclab.app import AppLauncher

          # No in-script watchdog: a Python thread's time.sleep + os._exit
          # cannot preempt a Kit init that hangs in a C call holding the GIL
          # (observed on this runner for 40 minutes). The hard timeout lives
          # at the PowerShell layer below (Start-Process + WaitForExit) which
          # is OS-level and immune to GIL.

          app_launcher = AppLauncher(headless=True, enable_cameras=True)
          sim = app_launcher.app
          assert sim is not None, "AppLauncher did not return a SimulationApp"

          import gymnasium as gym
          import isaaclab_tasks  # noqa: F401  (gym env registration)

          env = gym.make("Isaac-Cartpole-RGB-Camera-Direct-v0", num_envs=1)
          obs, info = env.reset()
          assert obs is not None, "env.reset returned None observation"
          for step_i in range(3):
              action = env.action_space.sample()
              obs, reward, terminated, truncated, info = env.step(action)
              assert obs is not None, f"env.step {step_i} returned None observation"
          env.close()
          sim.close()
          sys.exit(0)
          '@
          $script | Out-File -FilePath perception_smoke.py -Encoding utf8
          # Process-level watchdog: 3 min hard cap. See kit-launch-windows for
          # rationale — Python thread watchdogs cannot preempt a GIL-held
          # Kit/Vulkan init.
          $proc = Start-Process -PassThru -NoNewWindow -FilePath python -ArgumentList "perception_smoke.py"
          if (-not $proc.WaitForExit(180000)) {
            Write-Host "::error::perception-windows hard timeout (3 min) — Kit/Vulkan hung; killing python tree"
            $proc.Kill($true)
            $proc.WaitForExit()
            exit 124
          }
          exit $proc.ExitCode

      - name: Upload smoke script as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perception-smoke-windows-script
          path: perception_smoke.py
          retention-days: 7
