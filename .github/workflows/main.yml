name: sync-fork

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: develop
